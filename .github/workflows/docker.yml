# .github/workflows/docker.yml
#
# Pipeline DAG:
#
#   prepare ─┐
#             ├─→ scan-source → build → publish
#   test    ─┘
#
# Job responsibilities:
#   prepare      — compute image metadata once from GitHub context (no checkout needed)
#   test         — go test -race, verify go.mod and go.sum are clean
#   scan-source  — trivy fs scan on source + config files
#   build        — build image, scan locally on PRs (--load, amd64 only)
#   publish      — push multi-arch, scan digest, sign (main/tags only)
#
# Trade-offs documented:
#   - Double build on push: see docs/decisions/0005-pr-image-scanning.md
#   - PR scan is amd64 only: see ADR-005
#
# Secrets required:
#   GITHUB_TOKEN — auto-provided. No other secrets needed.
#   cosign uses keyless signing via GitHub Actions OIDC.

name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Prepare
  # Computes image metadata from GitHub context only.
  # No checkout needed — metadata-action uses github.* variables.
  # Outputs consumed by build and publish jobs.
  # ─────────────────────────────────────────────────────────────
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      version: ${{ steps.meta.outputs.version }}
      json: ${{ steps.meta.outputs.json }}

    steps:
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=docker-production-patterns
            org.opencontainers.image.description=Production-grade Docker patterns with Go
            org.opencontainers.image.vendor=markof88

  # ─────────────────────────────────────────────────────────────
  # Job 2: Test
  # Runs in parallel with prepare — consumes no prepare outputs.
  # Fast feedback on broken code before any Docker work begins.
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # go mod tidy updates both go.mod and go.sum.
      # git diff --exit-code catches any uncommitted changes to either file,
      # preventing PRs with dirty module state from merging.
      - name: Verify go.mod and go.sum are clean
        run: |
          go mod tidy
          git diff --exit-code

      - name: Run tests
        run: go test -race -count=1 ./...

  # ─────────────────────────────────────────────────────────────
  # Job 3: Scan source
  # Waits for both prepare and test before proceeding.
  # Trivy scans Dockerfile, IaC, and config files.
  # Uses trivy.yaml for consistent scan configuration.
  # Fails pipeline on HIGH/CRITICAL — not advisory.
  # ─────────────────────────────────────────────────────────────
  scan-source:
    name: Scan source
    runs-on: ubuntu-latest
    needs: [prepare, test]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Run Trivy filesystem scan
        id: trivy-fs
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          format: sarif
          output: trivy-fs-results.sarif
          exit-code: "1"
          ignore-unfixed: "true"
          severity: HIGH,CRITICAL

      - name: Upload Trivy FS SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

  # ─────────────────────────────────────────────────────────────
  # Job 4: Build
  #
  # On PRs:
  #   - Builds linux/amd64 only (--load requires single platform)
  #   - Loads image into local Docker daemon
  #   - Scans loaded image with Trivy (no registry needed)
  #   - HIGH/CRITICAL findings block merge
  #
  # On push to main/tags:
  #   - Builds linux/amd64 + linux/arm64 (multi-arch, no push)
  #   - No image scan here — publish scans the pushed digest
  #
  # Note: push events trigger two builds (here + publish).
  # This is a deliberate trade-off: clean job separation and
  # permission scoping over build efficiency.
  # Registry cache (buildcache tag) significantly reduces the cost.
  # See: docs/decisions/0005-pr-image-scanning.md
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: [prepare, scan-source]
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      # ── PR path: single-arch, load into daemon, scan locally ──
      - name: Build image for PR validation (linux/amd64, --load)
        if: github.event_name == 'pull_request'
        id: build-pr
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: linux/amd64
          pull: true
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-scan
          labels: ${{ needs.prepare.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          provenance: false
          sbom: false

      - name: Scan PR image with Trivy (local daemon)
        if: github.event_name == 'pull_request'
        id: trivy-pr
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-scan
          trivy-config: trivy.yaml
          format: sarif
          output: trivy-pr-results.sarif
          exit-code: "1"
          ignore-unfixed: "true"
          severity: HIGH,CRITICAL

      - name: Upload PR image scan SARIF
        if: github.event_name == 'pull_request' && always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-pr-results.sarif
          category: trivy-pr-image

      # ── Push path: multi-arch validation build (no push) ──
      - name: Build multi-arch image for validation (no push)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: false
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          provenance: true
          sbom: true

  # ─────────────────────────────────────────────────────────────
  # Job 5: Publish
  # Runs only on push to main or version tags — never on PRs.
  # Rebuilds multi-arch, pushes, scans the exact digest, signs.
  #
  # Scans digest (not tag) — tags are mutable, digests are not.
  # This guarantees we scan exactly what was pushed.
  # ─────────────────────────────────────────────────────────────
  publish:
    name: Push, scan, sign
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build-push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: true
          sbom: true

      - name: Scan published image with Trivy
        id: trivy-image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}
          trivy-config: trivy.yaml
          format: sarif
          output: trivy-image-results.sarif
          exit-code: "1"
          ignore-unfixed: "true"
          severity: HIGH,CRITICAL

      - name: Upload image scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"