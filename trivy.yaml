# trivy.yaml — Trivy scanner configuration
#
# This file configures scan behavior shared between local runs (make scan)
# and CI. Severity, exit-code, and ignore-unfixed are set in the GitHub
# Actions workflow directly so they are visible alongside the pipeline logic.
#
# Local scan: trivy image --config trivy.yaml <image>

# Cache the vulnerability database locally to speed up repeated scans.
cache:
  dir: /tmp/trivy-cache

# Ignore specific CVEs that are accepted risks.
# Add entries here with a comment explaining why they are accepted.
# Format: one CVE per line
# Example:
# CVE-2023-XXXXX  # No fix available; mitigated by network policy
